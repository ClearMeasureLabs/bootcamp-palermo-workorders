trigger:
    #Commenting out branch trigger during testing
    - "august-2025-workshop"
    #- none
    
variables:
    major: 2
    minor: 4
    FLYWAY_CACHE_FOLDER: $(Pipeline.Workspace)/flyway
name: $(major).$(minor).$(Rev:r)

stages:
- stage: 'Integration_Build'
  displayName: 'Build Application'
  jobs:
    - job: 'Build'
      displayName: 'Build job'
      pool:
        vmImage: 'windows-latest'
      variables:
      - group: onion8-flyway-tdd-workshop
      steps:
      # Dependencies
      
      - task: UseDotNet@2
        displayName: 'Install SDK 9.0.302'
        inputs:
          packageType: 'sdk'
          version: '9.0.302'
      - task: UseDotNet@2
        inputs:
          packageType: 'runtime'
          version: '9.0.7'
      # Set environment variables
      - task: PowerShell@2
        inputs:
          targetType: 'inline'
          script: |
            [System.Environment]::SetEnvironmentVariable('Version','$(Build.BuildNumber)')
            echo $env:Version
            echo $(Build.BuildNumber)

      - task: PowerShell@2
        displayName: Build.ps1
        inputs:
          targetType: filePath
          filePath: ./build.ps1
          arguments: '; CIBuild'
      - task: PublishTestResults@2
        displayName: 'Publish Test Results ./build/test/*.trx'
        inputs:
          testResultsFormat: VSTest
          testResultsFiles: 'build/test/**/*.trx'
          mergeTestResults: true
          testRunTitle: 'CI Tests'
        continueOnError: true
        condition: succeededOrFailed()
      - task: PublishCodeCoverageResults@1
        displayName: 'Publish code coverage UnitTests'
        inputs:
          codeCoverageTool: Cobertura
          summaryFileLocation: '$(System.DefaultWorkingDirectory)/**/build/test/**/In/**/coverage.cobertura.xml'
        
      - task: NuGetCommand@2
        inputs:
          command: 'push'
          packagesToPush: '.\build\*.nupkg'
          publishVstsFeed: '$(AzureFeedName)'

    - job: 'DockerBuildandPush'
      pool:
        vmImage: 'ubuntu-latest'
      variables:
        - group: onion8-flyway-tdd-workshop
      dependsOn: Build
 
      steps:
      - task: DownloadPackage@1
        displayName: 'Download UI Package'
        inputs:
          packageType: 'nuget'
          feed: '$(AzureFeedName)'
          view: 'Local'
          definition: 'ChurchBulletin.UI'
          version: '$(Build.BuildNumber)'
          downloadPath: '$(System.DefaultWorkingDirectory)/built'
          extract: true

      - task: Docker@2
        displayName: 'Build & Push Docker Image'
        inputs:
          containerRegistry: 'Onion-Architecture-Dotnet-8-Flyway-Azure-SC-CR'
          repository: 'ChurchBulletin.UI'
          command: 'buildAndPush'
          Dockerfile: '**/Dockerfile'
          tags: |
            $(Build.BuildNumber)

- stage: 'TDD'
  displayName: 'TDD (via Octopus Deploy)'
  jobs: 
    - deployment: 'DeployToTDD'
      pool:
        vmImage: 'windows-latest'
      variables:
      - group: Integration-Build-Workshop
      - name: branch
        value: $[coalesce(variables['system.pullRequest.sourceBranch'], variables['build.sourceBranch'])] 
      environment: 'Workshop-TDD'
      strategy:
        runOnce:
          deploy:
            steps:
            - task: OctopusCreateRelease@5
              name: 'CreateRelease'
              inputs:
                OctoConnectedServiceName: 'octoServiceConnection'
                Space: '$(OctoSpace)'
                ProjectGroup: '$(OctoProjectGroup)'
                ProjectName: '$(OctoProjectName)'
                ReleaseNumber: '$(Build.BuildNumber)'
                Channel: 'Default'
                GitRef: '$(branch)'
                DeployToEnvironment: 'TDD'
                DeploymentProgress: true
                AdditionalArguments: '--deploymenttimeout=00:30:00 --variable=ResourceGroupName:$(TDDResourceGroup) --variable=container_app_name:$(TDDAppName)' 
            - task: AzureCLI@2
              inputs:
                azureSubscription: 'Onion-Architecture-Dotnet-8-Flyway-Azure-SC-ARM-MVP'
                scriptType: 'ps'
                scriptLocation: 'inlineScript'
                inlineScript: |
                  az config set extension.use_dynamic_install=yes_without_prompt
                  $containerAppURL = az containerapp show --resource-group $(TDDResourceGroup) --name $(TDDAppName) --query properties.configuration.ingress.fqdn
                  $containerAppURL = $containerAppURL -replace '"', ''
                  [System.Environment]::SetEnvironmentVariable("containerAppURL", $containerAppURL, "User")
            - task: DownloadPackage@1
              displayName: 'Download Acceptance Test Package'
              inputs:
                packageType: 'nuget'
                feed: '$(FeedName)'
                view: 'Local'
                definition: 'ChurchBulletin.AcceptanceTests'
                version: '$(Build.BuildNumber)'
                downloadPath: '$(System.DefaultWorkingDirectory)/tests'
                extract: true

- stage: 'UAT'
  displayName: 'UAT'
  jobs: 
    - deployment: 'DeployToUAT'
      pool:
        vmImage: 'windows-latest'
      variables:
        - group: Integration-Build-Workshop
      environment: 'Workshop-UAT'  
      strategy:
        runOnce:
          deploy:
            steps:
            - task: OctopusDeployRelease@5
              name: deploytoUAT
              inputs:
                OctoConnectedServiceName: 'octoServiceConnection'
                Space: '$(OctoSpace)'
                ProjectGroup: '$(OctoProjectGroup)'
                Project: '$(OctoProjectName)'
                ReleaseNumber: '$(Build.BuildNumber)'
                Environments: 'UAT'
                ShowProgress: true
                AdditionalArguments: '--deploymenttimeout=00:30:00'



- stage: 'Production'
  displayName: 'Prod'  
  jobs: 
    - deployment: 'DeployToProd'
      pool:
        vmImage: 'windows-latest'
      variables:
        - group: Integration-Build-Workshop
      environment: 'Workshop-Prod'
      strategy:
        runOnce:
          deploy:
            steps:
            - task: OctopusDeployRelease@5
              name: deploytoProd
              inputs:
                OctoConnectedServiceName: 'octoServiceConnection'
                Space: '$(OctoSpace)'
                ProjectGroup: '$(OctoProjectGroup)'
                Project: '$(OctoProjectName)'
                ReleaseNumber: '$(Build.BuildNumber)'
                Environments: 'Prod'
                ShowProgress: true 
                AdditionalArguments: '--deploymenttimeout=00:30:00'